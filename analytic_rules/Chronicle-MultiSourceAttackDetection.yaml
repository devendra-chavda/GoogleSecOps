id: 12345678-1234-1234-1234-123456789004
name: Chronicle - Multi-Source Attack Detection
description: |
  'Detects coordinated attacks from multiple source IPs targeting same host(s) or user(s). Indicates potential lateral movement, privilege escalation, or distributed attack.'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: GoogleCloudSecurityOperationsAlert
    dataTypes:
      - DetectionAlerts_CL
queryFrequency: 30m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - LateralMovement
  - PrivilegeEscalation
  - CommandAndControl
relevantTechniques:
  - T1210
  - T1570
  - T1021
query: |
  secops_detection
  | where severity == "HIGH" or severity == "CRITICAL"
  | where alert_state == "ALERTING"
  | extend
      SourceIP = var_principal_ip,
      TargetHost = var_target_hostname,
      TargetUser = var_target_user_userid
  | summarize
      SourceIPCount = dcount(var_principal_ip),
      SourceHostCount = dcount(var_principal_hostname),
      DetectionCount = count(),
      MaxRiskScore = max(risk_score),
      FirstDetectionTime = min(createdTime),
      LastDetectionTime = max(createdTime),
      SourceIPs = make_set(var_principal_ip),
      SourceHosts = make_set(var_principal_hostname),
      Rules = make_set(ruleName),
      Severities = make_set(severity)
      by var_target_hostname, var_target_user_userid
  | where SourceIPCount > 3 or SourceHostCount > 2
  | extend
      AttackScore = (SourceIPCount * 2) + DetectionCount + MaxRiskScore,
      AttackPattern = case(
          SourceIPCount > 5, "Distributed Attack",
          SourceHostCount > 2, "Coordinated Multi-Host",
          "Multi-Source Single Target"
      )
  | sort by AttackScore desc
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: var_target_hostname
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: var_target_user_userid
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIPs
customDetails:
  TargetHost: var_target_hostname
  TargetUser: var_target_user_userid
  SourceIPCount: SourceIPCount
  SourceHostCount: SourceHostCount
  AttackPattern: AttackPattern
  SourceIPs: SourceIPs
  RiskScore: MaxRiskScore
  DetectionCount: DetectionCount
  Timeline: FirstDetectionTime
  LastActivity: LastDetectionTime
  TriggeredRules: Rules
  Severities: Severities
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reGroupPeriod: 8h
    matchingAttribute: var_target_hostname
    reopenClosedIncident: true
version: 1.0.0
kind: Scheduled
