id: 12345678-1234-1234-1234-123456789001
name: Chronicle - High Severity Detection Alert
description: |
  'Detects high or critical severity security events from Google Chronicle. This rule creates incidents for HIGH and CRITICAL severity detections that require immediate investigation. This rule depends on the Chronicle Detection parser.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: GoogleCloudSecurityOperationsAlert
    dataTypes:
      - GCSDetectionAlerts_CL
queryFrequency: 5m
queryPeriod: 5m
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - CredentialAccess
  - Execution
  - Persistence
  - PrivilegeEscalation
  - DefenseEvasion
  - Discovery
  - LateralMovement
  - Collection
  - CommandAndControl
  - Exfiltration
  - Impact
relevantTechniques:
  - T1110
  - T1078
  - T1566
query: |
  chronicle_detection
  | where is_high_severity == "true"
  | where is_active_alert == "true"
  | extend
      IncidentTime = createdTime,
      IPAddress = var_correlation_ip,
      TargetHost = var_target_hostname,
      TargetUser = var_target_user_userid,
      PrincipalIP = var_principal_ip,
      RiskScore = risk_score
  | project-away detection_array, detection_o
  | sort by severity_level desc, createdTime desc
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: var_correlation_ip
      - identifier: Address
        columnName: var_principal_ip
      - identifier: Address
        columnName: var_target_ip
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: var_principal_hostname
      - identifier: HostName
        columnName: var_target_hostname
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: var_target_user_userid
  - entityType: URL
    fieldMappings:
      - identifier: Url
        columnName: urlBackToProduct
customDetails:
  RuleName: ruleName
  RuleId: ruleId
  RuleType: ruleType
  AlertState: alertState
  RiskScore: risk_score
  DetectionTime: detectionTime
  PrincipalIPCount: var_principal_ip_count
  SourceIPCount: var_source_ip_count
  Description: description
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reGroupPeriod: 6h
    matchingAttribute: id
    reopenClosedIncident: true
version: 1.0.0
kind: Scheduled
