id: 12345678-1234-1234-1234-123456789003
name: Chronicle - Credential Access Attack Detection
description: |
  'Detects credential access attacks (MITRE T1110 - Brute Force) from Chronicle Security alerts. Identifies suspicious authentication patterns and account compromise attempts.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: GoogleCloudSecurityOperationsAlert
    dataTypes:
      - DetectionAlerts_CL
queryFrequency: 15m
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
relevantTechniques:
  - T1110
  - T1078
  - T1566
query: |
  chronicle_detection
  | where ruleLabels has "Credential Access"
  | where severity == "HIGH" or severity == "CRITICAL"
  | where alert_state == "ALERTING"
  | extend
      AttackingIP = var_principal_ip,
      TargetUser = var_target_user_userid,
      TargetHost = var_target_hostname,
      AttackTechnique = ruleLabels
  | summarize
      DetectionCount = count(),
      UniqueTargetUsers = dcount(var_target_user_userid),
      UniqueTargetHosts = dcount(var_target_hostname),
      MaxRiskScore = max(risk_score),
      FailureCount = var_principal_ip_count,
      FirstDetectionTime = min(createdTime),
      LastDetectionTime = max(createdTime),
      AffectedUsers = make_set(var_target_user_userid),
      AffectedHosts = make_set(var_target_hostname),
      Rules = make_set(ruleName)
      by var_principal_ip, var_principal_hostname
  | where DetectionCount > 1 or FailureCount > 5
  | sort by MaxRiskScore desc, DetectionCount desc
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: var_principal_ip
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: var_principal_hostname
      - identifier: HostName
        columnName: AffectedHosts
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AffectedUsers
customDetails:
  AttackingIP: var_principal_ip
  SourceHost: var_principal_hostname
  TargetUsers: AffectedUsers
  TargetHosts: AffectedHosts
  FailureCount: FailureCount
  RiskScore: MaxRiskScore
  DetectionCount: DetectionCount
  FirstDetectionTime: FirstDetectionTime
  LastDetectionTime: LastDetectionTime
  TriggeredRules: Rules
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reGroupPeriod: 6h
    matchingAttribute: var_principal_ip
    reopenClosedIncident: true
version: 1.0.0
kind: Scheduled
