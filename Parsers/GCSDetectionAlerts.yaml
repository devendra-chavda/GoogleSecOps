id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
Function:
  Title: Parser for Google Chronicle Stream Detection Alerts
  Version: '1.0.0'
  LastUpdated: '2026-04-16'
Category: Microsoft Sentinel Parser
FunctionName: GCSDetectionAlerts
FunctionAlias: GCSDetectionAlerts
FunctionParams:
  - Name: starttime
    Type: datetime
    Default: datetime(null)
  - Name: endtime
    Type: datetime
    Default: datetime(null)
  - Name: severity_filter
    Type: dynamic
    Default: dynamic([])
  - Name: alert_state_filter
    Type: string
    Default: '*'
FunctionQuery: |
    let _starttime = starttime;
    let _endtime = endtime;
    let _severity_filter = severity_filter;
    let _alert_state_filter = alert_state_filter;
    GCSDetectionAlerts_CL
    | where (isnull(_starttime) or detection_time >= _starttime)
        and (isnull(_endtime) or detection_time <= _endtime)
    | where array_length(_severity_filter) == 0 or severity in (_severity_filter)
    | where _alert_state_filter == '*' or alert_state == _alert_state_filter
    | extend
        DetectionId = detection_id,
        DetectionType = type,
        DetectionTime = detection_time,
        RuleId = rule_id,
        RuleName = rule_name,
        RuleVersion = rule_version,
        Severity = severity,
        Summary = summary,
        AlertState = alert_state,
        DetectorId = detector_id,
        UrlBackToProduct = url_back_to_product,
        RuleLabels = rule_labels,
        CollectionElements = collection_elements
    | extend
        SeverityOrder = case(
            Severity == "CRITICAL", 1,
            Severity == "HIGH", 2,
            Severity == "MEDIUM", 3,
            Severity == "LOW", 4,
            Severity == "INFORMATIONAL", 5,
            6
        )
    | extend
        IncidentSeverity = case(
            Severity in ("CRITICAL", "HIGH"), "High",
            Severity == "MEDIUM", "Medium",
            Severity == "LOW", "Low",
            Severity == "INFORMATIONAL", "Informational",
            "Informational"
        )
    | project-away
        SeverityOrder
