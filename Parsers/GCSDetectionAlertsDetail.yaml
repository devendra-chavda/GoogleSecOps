id: b2c3d4e5-f6a7-8901-bcde-f12345678901
Function:
  Title: Parser for Google Chronicle Detection Alerts - Expanded Detail
  Version: '1.0.0'
  LastUpdated: '2026-04-16'
Category: Microsoft Sentinel Parser
FunctionName: GCSDetectionAlertsDetail
FunctionAlias: GCSDetectionAlertsDetail
FunctionParams:
  - Name: starttime
    Type: datetime
    Default: datetime(null)
  - Name: endtime
    Type: datetime
    Default: datetime(null)
FunctionQuery: |
    let _starttime = starttime;
    let _endtime = endtime;
    let _extract_label = (labels:dynamic, label_key:string) {
        tostring(toscalar(
            print l=labels
            | mv-expand l
            | where tostring(l.key) == label_key
            | project tostring(l.value)
            | take 1
        ))
    };
    GCSDetectionAlerts_CL
    | where (isnull(_starttime) or detection_time >= _starttime)
        and (isnull(_endtime) or detection_time <= _endtime)
    | extend
        DetectionId = detection_id,
        DetectionTime = detection_time,
        RuleName = rule_name,
        RuleId = rule_id,
        RuleVersion = rule_version,
        Severity = severity,
        Summary = summary,
        AlertState = alert_state,
        DetectorId = detector_id,
        UrlBackToProduct = url_back_to_product
    // --- Split collection_elements by source into rows, then re-aggregate ---
    | mv-expand _item = collection_elements
    | extend
        _src = tostring(_item.source),
        _key = tostring(_item.key),
        _val = tostring(_item.value)
    | summarize
        DetectionFields = make_bag_if(bag_pack(_key, _val), _src == "detectionField"),
        Outcomes        = make_list_if(bag_pack("key", _key, "value", _val, "udm_path", _src),
                                       _src !in ("detectionField", "variable")),
        Variables       = make_bag_if(bag_pack(_key, _val), _src == "variable"),
        RuleLabelsRaw   = take_any(rule_labels)
        by
        DetectionId, DetectionTime, RuleName, RuleId, RuleVersion,
        Severity, Summary, AlertState, DetectorId, UrlBackToProduct,
        TimeGenerated
    // --- Extract well-known rule labels ---
    | mv-expand _lbl = RuleLabelsRaw
    | extend _lbl_key = tostring(_lbl.key), _lbl_val = tostring(_lbl.value)
    | summarize
        take_any(DetectionFields, Outcomes, Variables),
        RuleLabelAuthor      = take_anyif(_lbl_val, _lbl_key == "author"),
        RuleLabelPriority    = take_anyif(_lbl_val, _lbl_key == "priority"),
        RuleLabelTags        = take_anyif(_lbl_val, _lbl_key == "tags"),
        RuleLabelDescription = take_anyif(_lbl_val, _lbl_key == "description"),
        RuleLabelSeverity    = take_anyif(_lbl_val, _lbl_key == "severity"),
        RuleLabelRuleName    = take_anyif(_lbl_val, _lbl_key == "rule_name")
        by
        DetectionId, DetectionTime, RuleName, RuleId, RuleVersion,
        Severity, Summary, AlertState, DetectorId, UrlBackToProduct,
        TimeGenerated
    // --- Convenience fields from outcomes ---
    | extend
        PrincipalIp       = tostring(DetectionFields.correlation_ip),
        PrincipalHostname = tostring(DetectionFields.principal_hostname),
        TargetIp          = tostring(DetectionFields.target_ip),
        TargetHostname    = tostring(DetectionFields.target_hostname),
        TargetUser        = tostring(DetectionFields.target_user_userid)
    | extend
        IncidentSeverity = case(
            Severity in ("CRITICAL", "HIGH"), "High",
            Severity == "MEDIUM", "Medium",
            Severity == "LOW", "Low",
            "Informational"
        )
